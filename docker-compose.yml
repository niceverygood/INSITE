version: "3.9"

services:
  # ========== Databases ==========
  postgres:
    image: postgres:16-alpine
    container_name: insite-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-insite}
      POSTGRES_USER: ${POSTGRES_USER:-insite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insite_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insite-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: insite-timescaledb
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-insite_metrics}
      POSTGRES_USER: ${TIMESCALE_USER:-insite}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-insite_password}
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-insite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insite-net

  # ========== Cache ==========
  redis:
    image: redis:7-alpine
    container_name: insite-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - insite-net

  # ========== Message Queue ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: insite-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - insite-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: insite-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - insite-net

  # ========== Search / Logging ==========
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: insite-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - insite-net

  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: insite-kibana
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    networks:
      - insite-net

  # ========== Monitoring ==========
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: insite-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - insite-net

  grafana:
    image: grafana/grafana:10.3.0
    container_name: insite-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - insite-net

  # ========== Backend ==========
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insite-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - report_data:/app/reports
    networks:
      - insite-net

  # ========== Frontend ==========
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insite-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - insite-net

  # ========== Collector Agent ==========
  collector:
    build:
      context: ./collector
      dockerfile: Dockerfile
    container_name: insite-collector
    env_file:
      - .env
    depends_on:
      - kafka
      - redis
      - postgres
    volumes:
      - ./collector:/app
    networks:
      - insite-net

  # ========== Nginx Reverse Proxy ==========
  nginx:
    image: nginx:1.25-alpine
    container_name: insite-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend
    networks:
      - insite-net

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  zookeeper_data:
  kafka_data:
  elasticsearch_data:
  prometheus_data:
  grafana_data:
  report_data:

networks:
  insite-net:
    driver: bridge
