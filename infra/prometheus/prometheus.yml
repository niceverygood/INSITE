global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node-exporter"
    static_configs:
      - targets: []
    # Targets are dynamically registered via file_sd_configs
    file_sd_configs:
      - files:
          - "/etc/prometheus/targets/*.json"
        refresh_interval: 30s

  - job_name: "insite-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

remote_write:
  - url: "http://backend:8000/api/v1/metrics/ingest/prometheus"
